<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product != null} ? 'Редактировать товар — ShopApp' : 'Добавить товар — ShopApp'">Товар — ShopApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a th:href="@{/home}" class="nav-logo">🛒 ShopApp</a>
        <div class="nav-auth">
            <span class="nav-username" th:if="${user != null}" th:text="'Привет, ' + ${user.username} + '!'"></span>
            <a th:href="@{/logout}" class="btn btn-outline">Выйти</a>
        </div>
    </div>
</nav>

<main class="container" style="padding-top: 2rem; max-width: 600px;">
    <a th:href="@{/home}" class="back-link">← Назад в каталог</a>

    <div class="auth-card" style="margin-top: 1.5rem;">
        <h1 class="auth-title" th:text="${product != null} ? 'Редактировать товар' : 'Добавить товар'">Товар</h1>

        <form id="product-form" th:action="@{/product}" method="post" class="auth-form" novalidate>
            <input type="hidden" name="action" th:value="${product != null} ? 'update' : 'add'">
            <input type="hidden" name="id" th:if="${product != null}" th:value="${product.id}">

            <div class="form-group">
                <label for="name" class="form-label">Название товара *</label>
                <input type="text" id="name" name="name" class="form-input"
                       th:value="${product != null} ? ${product.name} : ''"
                       placeholder="Введите название" required>
                <span class="form-error" id="name-error"></span>
            </div>
            <div class="form-group">
                <label for="description" class="form-label">Описание</label>
                <textarea id="description" name="description" class="form-input form-textarea"
                          placeholder="Введите описание товара"
                          th:text="${product != null} ? ${product.description} : ''"></textarea>
            </div>
            <div class="form-group">
                <label for="price" class="form-label">Цена ($) *</label>
                <input type="number" id="price" name="price" class="form-input"
                       th:value="${product != null} ? ${product.price} : ''"
                       placeholder="0.00" step="0.01" min="0" required>
                <span class="form-error" id="price-error"></span>
            </div>
            <div class="form-group">
                <label for="stock" class="form-label">Количество на складе *</label>
                <input type="number" id="stock" name="stock" class="form-input"
                       th:value="${product != null} ? ${product.stock} : ''"
                       placeholder="0" min="0" required>
                <span class="form-error" id="stock-error"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full"
                    th:text="${product != null} ? 'Сохранить изменения' : 'Добавить товар'">
                Сохранить
            </button>
        </form>
    </div>
</main>

<footer class="footer">
    <p>© 2026 ShopApp. Все права защищены.</p>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
